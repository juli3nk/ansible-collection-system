---
- name: Ensure entropy daemon package state matches rngd_enabled
  become: true
  ansible.builtin.package:
    pkg: "{{ rngd_package }}"
    state: "{{ 'present' if rngd_enabled | bool else 'absent' }}"
  when: rngd_enabled | bool

- name: Ensure entropy daemon service is enabled and running
  become: true
  ansible.builtin.systemd:
    name: "{{ rngd_service }}"
    enabled: "{{ rngd_enabled | bool }}"
    state: "{{ 'started' if rngd_enabled | bool else 'stopped' }}"
  when: rngd_enabled | bool
