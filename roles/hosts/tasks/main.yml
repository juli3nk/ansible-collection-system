---
- name: Validate hosts entries
  ansible.builtin.assert:
    that:
      - item.ip is defined
      - item.ip | length > 0
      - item.names is defined
      - item.names | length > 0
    fail_msg: Each hosts_entries item must define ip and non-empty names.
  loop: "{{ hosts_entries }}"

- name: Ensure static hosts entries are present
  become: true
  ansible.builtin.lineinfile:
    path: "{{ hosts_file }}"
    regexp: '^{{ item.ip | regex_escape }}\s+'
    line: "{{ item.ip }} {{ item.names | unique | join(' ') }}"
    state: present
    mode: '0644'
  loop: "{{ hosts_entries }}"
  when: hosts_enabled | bool
