---
- name: Build effective sysctl settings
  ansible.builtin.set_fact:
    sysctl_settings_effective: >-
      {{
        (
          (sysctl_settings_common | default({}))
          | combine(sysctl_settings_host | default({}), recursive=True)
        )
        if (
          (sysctl_settings_common | default({}) | length > 0)
          or (sysctl_settings_host | default({}) | length > 0)
        )
        else (sysctl_settings | default({}))
      }}

- name: Ensure sysctl configuration is present
  become: true
  ansible.builtin.template:
    src: sysctl.conf.j2
    dest: "{{ sysctl_config_file }}"
    owner: root
    group: root
    mode: '0644'
  register: sysctl_config_result

- name: Reload sysctl configuration
  become: true
  ansible.builtin.command: sysctl --system
  changed_when: true
  when:
    - sysctl_reload
    - sysctl_config_result.changed
