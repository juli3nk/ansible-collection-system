---
- name: Validate uv role configuration
  ansible.builtin.import_tasks: validate.yml

- name: Install uv for each user
  ansible.builtin.include_tasks: install.yml
  loop: "{{ uv_user_getent_results.results | selectattr('rc', 'equalto', 0) | list }}"
  loop_control:
    label: "{{ uv_user.item }}"
    loop_var: uv_user

- name: Set uv facts for downstream roles
  ansible.builtin.import_tasks: facts.yml

- name: Verify uv installation
  ansible.builtin.import_tasks: verify.yml
