---
ssh_sshd_name: 'sshd'
ssh_sshd_config_path: '/etc/ssh/sshd_config'
ssh_sshd_state: 'started'
ssh_sshd_restart_handler_state: 'restarted'

ssh_sshd_challenge_response_auth: 'no'
ssh_sshd_kbd_interactive_authentication: 'no'
ssh_sshd_gss_api_authentication: 'no'
ssh_sshd_login_grace_time: '2m'
ssh_sshd_max_sessions: 3
ssh_sshd_max_auth_tries: 2
ssh_sshd_max_startups: '10:30:60'
ssh_sshd_password_authentication: 'yes'
ssh_sshd_permit_empty_password: 'no'
ssh_sshd_permit_root_login: 'no'
ssh_sshd_permit_user_environment: 'no'
ssh_sshd_allow_agent_forwarding: 'no'
ssh_sshd_allow_tcp_forwarding: 'no'
ssh_sshd_permit_tunnel: 'no'
ssh_sshd_client_alive_interval: 300
ssh_sshd_client_alive_count_max: 2
ssh_sshd_port: 22
ssh_sshd_print_last_log: 'no'
ssh_sshd_print_motd: 'no'
ssh_sshd_public_key_authentication: 'yes'
ssh_sshd_usedns: 'no'
ssh_sshd_x11_forwarding: 'no'
ssh_sshd_allow_users_manage: true
ssh_sshd_allow_users: []

# Override these lists only if needed for compatibility.
ssh_sshd_ciphers:
  - chacha20-poly1305@openssh.com
  - aes256-gcm@openssh.com
  - aes128-gcm@openssh.com
  - aes256-ctr
  - aes192-ctr
  - aes128-ctr
ssh_sshd_kex_algorithms:
  - sntrup761x25519-sha512@openssh.com
  - curve25519-sha256
  - curve25519-sha256@libssh.org
  - diffie-hellman-group16-sha512
ssh_sshd_macs:
  - hmac-sha2-512-etm@openssh.com
  - hmac-sha2-256-etm@openssh.com
  - hmac-sha2-512
  - hmac-sha2-256
