---
- name: Get a list of devices not partitioned
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      disks="$(lsblk --noheadings --paths --output NAME,TYPE,SIZE | awk 'BEGIN{OFS=":";} $2 == "disk" { print $1, $3 }')"
      for disk in $disks; do
        d="$(echo "$disk" | awk -F':' '{ print $1 }')"
        fs_exists="$(file -s "$d" | awk '$2 == "data" { print }' | wc -l)"
        if [ "$fs_exists" -eq 1 ]; then
          echo "$disk"
        fi
      done
    executable: '/bin/bash'
  register: disk_devices
  changed_when: false

- name: Create new array based on disk size matching
  ansible.builtin.set_fact:
    matched_disks: "{{ disk_additional_devices | map('combine', {'device': item.split(':')[0]}) | selectattr('match_size', 'equalto', item.split(':')[1]) | list }}"
  loop: "{{ disk_devices.stdout_lines }}"

- name: Print matched disks
  ansible.builtin.debug:
    var: matched_disks

- name: Create partition
  ansible.builtin.include_tasks: partition.yml
  when:
    - matched_disks is defined
    - not ansible_check_mode
  loop: "{{ matched_disks | default([]) }}"
  loop_control:
    loop_var: outer_item

- name: Format disk
  ansible.builtin.include_tasks: fs.yml
  when:
    - matched_disks is defined
    - not ansible_check_mode
  loop: "{{ matched_disks | default([]) }}"
  loop_control:
    loop_var: outer_item
