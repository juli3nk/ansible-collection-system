---
fail2ban_enabled: true
fail2ban_package: fail2ban
fail2ban_service: fail2ban
fail2ban_config_file: /etc/fail2ban/jail.local

fail2ban_ignoreip:
  - 127.0.0.1/8
  - ::1
fail2ban_bantime: 1h
fail2ban_findtime: 10m
fail2ban_maxretry: 5

fail2ban_sshd_enabled: true
fail2ban_sshd_port: ssh
fail2ban_sshd_logpath: "%(sshd_log)s"
