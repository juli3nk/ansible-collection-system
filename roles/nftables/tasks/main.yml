---
- name: Ensure nftables service is enabled and running
  become: true
  ansible.builtin.systemd:
    name: "{{ nftables_service }}"
    enabled: "{{ nftables_enabled | bool }}"
    state: "{{ 'started' if nftables_enabled | bool else 'stopped' }}"

- name: Ensure nftables configuration is present
  become: true
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: "{{ nftables_config_file }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart nftables
  when: nftables_enabled | bool

- name: Ensure nftables configuration is absent
  become: true
  ansible.builtin.file:
    path: "{{ nftables_config_file }}"
    state: absent
  when: not nftables_enabled | bool

- name: Ensure nftables packages are installed
  become: true
  ansible.builtin.package:
    pkg: "{{ [nftables_package] + ([nftables_iptables_package] if nftables_install_iptables_compat else []) }}"
    state: "{{ 'present' if nftables_enabled | bool else 'absent' }}"
