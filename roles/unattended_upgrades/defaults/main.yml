---
unattended_upgrades_enabled: true
unattended_upgrades_system_enabled: true
unattended_upgrades_package: unattended-upgrades

unattended_upgrades_apt_config_dir: /etc/apt/apt.conf.d
unattended_upgrades_auto_file: "{{ unattended_upgrades_apt_config_dir }}/20auto-upgrades"
unattended_upgrades_rules_file: "{{ unattended_upgrades_apt_config_dir }}/52unattended-upgrades"

unattended_upgrades_update_package_lists: 1
unattended_upgrades_download_upgradeable_packages: 1
unattended_upgrades_unattended_upgrade: 0
unattended_upgrades_autoclean_interval: 7

unattended_upgrades_allowed_origins:
  - 'origin=Debian,codename=${distro_codename},label=Debian-Security'
  - 'origin=Debian,codename=${distro_codename}-updates'

unattended_upgrades_auto_reboot: false
unattended_upgrades_auto_reboot_time: '02:00'
