---
- name: Add shell prompt script
  become: true
  ansible.builtin.template:
    src: "{{ shell_name }}_prompt.sh.j2"
    dest: "{{ shell_prompt_target_file }}"
    owner: 'root'
    group: 'root'
    mode: '0755'
  when:
    - shell_prompt_enabled | bool
    - shell_prompt_state == 'present'

- name: Remove shell prompt script
  become: true
  ansible.builtin.file:
    path: "{{ shell_prompt_target_file }}"
    state: 'absent'
  when:
    - (not shell_prompt_enabled | bool) or shell_prompt_state == 'absent'

- name: Ensure global PATH profile snippet is present
  become: true
  ansible.builtin.template:
    src: shell_path_global.sh.j2
    dest: "{{ shell_global_path_target_file }}"
    owner: root
    group: root
    mode: '0644'
  when: shell_global_path_prepend | length > 0

- name: Ensure global PATH profile snippet is absent when no global paths are configured
  become: true
  ansible.builtin.file:
    path: "{{ shell_global_path_target_file }}"
    state: absent
  when: shell_global_path_prepend | length == 0

- name: Get all users info
  ansible.builtin.getent:
    database: 'passwd'

- name: Ensure per-user bashrc template is present
  become: true
  ansible.builtin.template:
    src: bashrc.j2
    dest: "{{ ansible_facts.getent_passwd[item.key][4] }}/.bashrc"
    owner: "{{ ansible_facts.getent_passwd[item.key][1] }}"
    group: "{{ ansible_facts.getent_passwd[item.key][2] }}"
    mode: '0644'
  loop: "{{ shell_users | dict2items | selectattr('value.bashrc_template', 'defined') | selectattr('value.bashrc_template') | selectattr('key', 'in', ansible_facts.getent_passwd) }}"

- name: Ensure per-user PATH snippet is present
  become: true
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts.getent_passwd[item.key][4] }}/{{ shell_user_path_target_file }}"
    create: true
    owner: "{{ ansible_facts.getent_passwd[item.key][1] }}"
    group: "{{ ansible_facts.getent_passwd[item.key][2] }}"
    mode: '0644'
    marker: "# {mark} ANSIBLE MANAGED PATH ENTRIES"
    block: "{{ lookup('template', 'shell_path_user.sh.j2') }}"
  vars:
    shell_path_user_entries: "{{ item.value.path_prepend }}"
  loop: "{{ shell_users | dict2items | selectattr('value.path_prepend', 'defined') | selectattr('value.path_prepend') | selectattr('key', 'in', ansible_facts.getent_passwd) }}"
  loop_control:
    label: "{{ item.key }}"

- name: Ensure per-user bashrc extras blocks are present
  become: true
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts.getent_passwd[item.0.key][4] }}/.bashrc"
    create: true
    owner: "{{ ansible_facts.getent_passwd[item.0.key][1] }}"
    group: "{{ ansible_facts.getent_passwd[item.0.key][2] }}"
    mode: '0644'
    marker: "# {mark} ANSIBLE MANAGED BASHRC - {{ item.1.id }}"
    block: "{{ item.1.block }}"
  loop: >-
    {{ shell_users | dict2items
       | selectattr('value.bashrc_extras', 'defined')
       | selectattr('value.bashrc_extras')
       | selectattr('key', 'in', ansible_facts.getent_passwd)
       | subelements('value.bashrc_extras') }}
  loop_control:
    label: "{{ item.0.key }} - {{ item.1.id }}"

- name: Ensure per-user runtime directories are present
  become: true
  ansible.builtin.file:
    path: "/run/user/{{ ansible_facts.getent_passwd[item.key][1] }}"
    state: directory
    owner: "{{ ansible_facts.getent_passwd[item.key][1] }}"
    group: "{{ ansible_facts.getent_passwd[item.key][2] }}"
    mode: '0700'
  loop: "{{ shell_users | dict2items | selectattr('value.ensure_runtime_dir', 'defined') | selectattr('value.ensure_runtime_dir') | selectattr('key', 'in', ansible_facts.getent_passwd) }}"
