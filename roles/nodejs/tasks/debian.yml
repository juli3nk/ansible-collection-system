---
- name: Install Node.js from NodeSource
  become: true
  block:
    - name: Compute effective Node.js APT architecture
      ansible.builtin.set_fact:
        nodejs_apt_architecture: >-
          {{
            {
              'x86_64': 'amd64',
              'aarch64': 'arm64'
            }.get(ansible_facts['architecture'], ansible_facts['architecture'])
          }}

    - name: Assert Node.js supported architectures
      ansible.builtin.assert:
        that:
          - nodejs_apt_architecture in ['amd64', 'arm64']
        fail_msg: >-
          Unsupported architecture '{{ ansible_facts['architecture'] }}' for Node.js role.
          Supported architectures are amd64 and arm64.

    - name: Add NodeSource APT repository
      ansible.builtin.deb822_repository:
        name: "{{ nodejs_apt_repository_name }}"
        types:
          - deb
        signed_by: "{{ nodejs_apt_gpg_url }}"
        uris:
          - "{{ nodejs_repo_url }}"
        suites:
          - nodistro
        components:
          - main
        architectures:
          - "{{ nodejs_apt_architecture }}"
        install_python_debian: true
        state: present
      register: nodejs_apt_repository_result

    - name: Refresh APT cache after repository changes
      ansible.builtin.apt:
        update_cache: true
      when: nodejs_apt_repository_result.changed

    - name: Pin Node.js package origin to NodeSource
      ansible.builtin.copy:
        dest: "{{ nodejs_apt_pin_file }}"
        owner: root
        group: root
        mode: '0644'
        content: |
          Package: {{ nodejs_apt_pin_package }}
          Pin: origin {{ nodejs_apt_pin_origin }}
          Pin-Priority: {{ nodejs_apt_pin_priority }}
      when: nodejs_apt_pin_enabled | bool

    - name: Ensure Node.js is installed
      ansible.builtin.apt:
        name: nodejs
        state: present

- name: Ensure optional Node.js build tools are installed
  become: true
  ansible.builtin.apt:
    name:
      - build-essential
      - make
      - g++
      - python3
      - cmake
    state: present
  when: nodejs_setup_build_tools | bool

- name: Ensure pnpm is installed globally
  become: true
  block:
    - name: Check if pnpm is already installed
      ansible.builtin.command: pnpm --version
      register: pnpm_check
      failed_when: false
      changed_when: false

    - name: Install pnpm globally
      ansible.builtin.command: npm install -g pnpm
      when: pnpm_check.rc != 0

- name: Verify Node.js and pnpm installation
  block:
    - name: Verify Node.js installation
      ansible.builtin.command: node --version
      register: node_version
      changed_when: false

    - name: Verify pnpm installation
      ansible.builtin.command: pnpm --version
      register: pnpm_version
      changed_when: false

    - name: Display Node.js and pnpm versions
      ansible.builtin.debug:
        msg:
          - "Node.js version: {{ node_version.stdout }}"
          - "pnpm version: {{ pnpm_version.stdout }}"
