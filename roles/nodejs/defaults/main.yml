---
nodejs_version_major: 24
nodejs_setup_build_tools: true

nodejs_apt_repository_name: 'nodesource'
nodejs_apt_gpg_url: 'https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key'
nodejs_repo_url: "https://deb.nodesource.com/node_{{ nodejs_version_major }}.x"

nodejs_apt_pin_enabled: true
nodejs_apt_pin_file: /etc/apt/preferences.d/nodejs
nodejs_apt_pin_package: nodejs
nodejs_apt_pin_origin: deb.nodesource.com
nodejs_apt_pin_priority: 600
