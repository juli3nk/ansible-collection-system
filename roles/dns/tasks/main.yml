---
- name: Validate DNS role configuration
  ansible.builtin.assert:
    that:
      - dns_mode in ['resolved', 'dhcp', 'static']
      - dns_mode == 'resolved' or not dns_enable_dnssec | bool
      - dns_mode == 'resolved' or dns_fallback_servers == ['1.1.1.1', '1.0.0.1']
      - dns_mode != 'dhcp' or dns_nameservers | length == 0
      - dns_mode != 'static' or dns_nameservers | length > 0
    fail_msg: >-
      Invalid DNS configuration. dns_mode must be dhcp/resolved/static.
      dns_nameservers is ignored in dhcp mode.
      dns_enable_dnssec and custom dns_fallback_servers are only supported in resolved mode.

- name: Configure DNS with systemd-resolved
  when: dns_mode == 'resolved'
  block:
    - name: Ensure systemd-resolved package is present
      become: true
      ansible.builtin.apt:
        update_cache: true
        name: 'systemd-resolved'
        state: present

    - name: Ensure systemd-resolved configuration is present
      become: true
      ansible.builtin.template:
        src: resolved.conf.j2
        dest: "{{ dns_resolved_config_path }}"
        owner: root
        group: root
        mode: '0644'
      notify: Restart systemd-resolved

    - name: Ensure systemd-resolved is enabled and running
      become: true
      ansible.builtin.systemd:
        name: "{{ dns_resolved_service }}"
        enabled: true
        state: started

    - name: Ensure /etc/resolv.conf points to systemd-resolved stub
      become: true
      ansible.builtin.file:
        src: /run/systemd/resolve/stub-resolv.conf
        dest: "{{ dns_static_resolv_conf_path }}"
        state: link
        force: true

- name: Ensure systemd-resolved is disabled
  become: true
  ansible.builtin.systemd:
    name: "{{ dns_resolved_service }}"
    enabled: false
    state: stopped
  when: dns_mode in ['static', 'dhcp']
  ignore_errors: true

- name: Remove systemd-resolved symlink if present
  become: true
  block:
    - name: Check /etc/resolv.conf current state
      ansible.builtin.stat:
        path: "{{ dns_static_resolv_conf_path }}"
      register: dns_resolv_conf_stat

    - name: Remove /etc/resolv.conf symlink
      ansible.builtin.file:
        path: "{{ dns_static_resolv_conf_path }}"
        state: absent
      when: dns_resolv_conf_stat.stat.islnk | default(false)
  when: dns_mode in ['static', 'dhcp']

- name: Configure static resolver
  when: dns_mode == 'static'
  block:
    - name: Ensure static /etc/resolv.conf is present
      become: true
      ansible.builtin.template:
        src: resolv.conf.j2
        dest: "{{ dns_static_resolv_conf_path }}"
        owner: root
        group: root
        mode: '0644'
